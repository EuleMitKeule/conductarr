services:
  conductarr:
    build: .
    container_name: conductarr
    environment:
      PUID: 1000
      PGID: 1000
      UMASK: "022"
      TZ: UTC
      LOG_LEVEL: debug
      DEV_SAB_INI: /sabnzbd.ini
    volumes:
      - ./config-docker:/config
      - ./dev/sabnzbd/sabnzbd.ini:/sabnzbd.ini:ro
    command: conductarr watch
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      sabnzbd:
        condition: service_healthy

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
    volumes:
      - ./dev/sabnzbd:/config
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

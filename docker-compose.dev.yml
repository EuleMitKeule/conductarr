services:
  conductarr:
    build: .
    container_name: conductarr
    environment:
      PUID: 1000
      PGID: 1000
      UMASK: "022"
      TZ: UTC
      LOG_LEVEL: debug
    volumes:
      - ./config-docker:/config
    command: conductarr watch

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
    volumes:
      - ./dev/sabnzbd:/config
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

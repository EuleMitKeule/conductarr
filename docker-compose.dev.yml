services:
  conductarr:
    build: .
    container_name: conductarr
    environment:
      PUID: 1000
      PGID: 1000
      UMASK: "022"
      TZ: UTC
      LOG_LEVEL: debug
    volumes:
      - ./config-docker:/config
    command: conductarr watch
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      mock-sabnzbd:
        condition: service_healthy
      mock-radarr:
        condition: service_healthy
      mock-sonarr:
        condition: service_healthy

  mock-sabnzbd:
    build: ./tests/mocks
    container_name: mock-sabnzbd
    environment:
      SERVICE: sabnzbd
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api?mode=version&apikey=sabnzbd-test-key')"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-radarr:
    build: ./tests/mocks
    container_name: mock-radarr
    environment:
      SERVICE: radarr
    ports:
      - "7878:7878"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7878/api/v3/system/status')"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-sonarr:
    build: ./tests/mocks
    container_name: mock-sonarr
    environment:
      SERVICE: sonarr
    ports:
      - "8989:8989"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8989/api/v3/system/status')"]
      interval: 5s
      timeout: 3s
      retries: 10

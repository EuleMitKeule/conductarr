name: Code Quality

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - master
      - develop

env:
  PYTHON_VERSION: "3.14"
  SONAR_PROJECT_KEY: EuleMitKeule_conductarr
  SONAR_PROJECT_ORGANIZATION: eule

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependecies
        run: uv sync --all-groups

  ruff:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependecies
        run: uv sync --all-groups

      - name: Run ruff
        run: |
          uv run ruff check .

  mypy:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependecies
        run: uv sync --all-groups

      - name: Run mypy
        run: |
          uv run mypy --strict .

  unit-tests:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v --cov=conductarr --cov-report=term
        env:
          COVERAGE_FILE: .coverage.unit

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage.unit

  integration-tests:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Start SABnzbd
        run: docker compose -f docker-compose.dev.yml up sabnzbd -d

      - name: Wait for SABnzbd to be healthy
        run: |
          for i in $(seq 1 40); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' sabnzbd 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "healthy" ]; then
              echo "SABnzbd is healthy"
              break
            fi
            echo "Waiting for SABnzbd... ($i/40, status=$STATUS)"
            sleep 5
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "SABnzbd did not become healthy in time"
            docker compose -f docker-compose.dev.yml logs sabnzbd
            exit 1
          fi

      - name: Extract API key from SABnzbd config
        run: |
          API_KEY=$(grep -oP '(?<=api_key = )\w+' ./dev/sabnzbd/sabnzbd.ini)
          echo "SABNZBD_API_KEY=$API_KEY" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests
        run: uv run pytest tests/integration -v -m integration --cov=conductarr --cov-report=term
        env:
          COVERAGE_FILE: .coverage.integration

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: .coverage.integration

      - name: Stop SABnzbd
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  sonar:
    needs: [cache, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Combine coverage reports
        run: |
          uv run coverage combine .coverage.unit .coverage.integration
          uv run coverage xml

      - name: fix code coverage paths
        run: |
          sed -i 's|/home/runner/work/conductarr/conductarr|/github/workspace|g' coverage.xml

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_PROJECT_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=conductarr
            -Dsonar.tests=tests
            -Dsonar.python.version=${{ env.PYTHON_VERSION }}
            -Dsonar.text.inclusions=**/*.py

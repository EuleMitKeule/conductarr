name: Code Quality

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - master
      - develop

env:
  PYTHON_VERSION: "3.14"
  SONAR_PROJECT_KEY: EuleMitKeule_conductarr
  SONAR_PROJECT_ORGANIZATION: eule

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependecies
        run: uv sync --all-groups

  ruff:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependecies
        run: uv sync --all-groups

      - name: Run ruff
        run: |
          uv run ruff check .

  mypy:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependecies
        run: uv sync --all-groups

      - name: Run mypy
        run: |
          uv run mypy --strict .

  unit-tests:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v --cov=conductarr --cov-report=term --cov-report=xml:coverage-unit.xml

      - name: Upload unit test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml
          if-no-files-found: error

  integration-tests:
    needs: cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build mock services
        run: docker compose -f docker-compose.dev.yml build mock-sabnzbd mock-radarr mock-sonarr

      - name: Start mock services
        run: docker compose -f docker-compose.dev.yml up mock-sabnzbd mock-radarr mock-sonarr -d

      - name: Wait for mock services to be healthy
        run: |
          SERVICES="mock-sabnzbd mock-radarr mock-sonarr"
          for i in $(seq 1 40); do
            ALL_HEALTHY=true
            for svc in $SERVICES; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$svc" 2>/dev/null || echo "not_found")
              if [ "$STATUS" != "healthy" ]; then
                ALL_HEALTHY=false
                echo "Waiting for $svc... ($i/40, status=$STATUS)"
              fi
            done
            if [ "$ALL_HEALTHY" = "true" ]; then
              echo "All mock services are healthy"
              break
            fi
            sleep 3
          done
          if [ "$ALL_HEALTHY" != "true" ]; then
            echo "Mock services did not become healthy in time"
            docker compose -f docker-compose.dev.yml logs mock-sabnzbd mock-radarr mock-sonarr
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-suffix: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests
        run: |
          uv run pytest tests/integration -v --cov=conductarr --cov-report=term --cov-report=xml:coverage-integration.xml
        env:
          SABNZBD_URL: http://localhost:8080
          RADARR_URL: http://localhost:7878
          SONARR_URL: http://localhost:8989

      - name: Show mock service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs mock-sabnzbd mock-radarr mock-sonarr

      - name: Upload integration test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml
          if-no-files-found: error

      - name: Stop mock services
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  sonar:
    needs: [cache, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download unit test coverage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration test coverage
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_PROJECT_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.python.coverage.reportPaths=coverage-unit.xml,coverage-integration.xml
            -Dsonar.sources=conductarr
            -Dsonar.tests=tests
            -Dsonar.python.version=${{ env.PYTHON_VERSION }}
            -Dsonar.text.inclusions=**/*.py

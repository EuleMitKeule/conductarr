name: Release

on:
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        concurrency: release
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Semantic Release
              id: semantic
              uses: cycjimmy/semantic-release-action@v6.0.0
              env:
                  GITHUB_TOKEN: ${{ secrets.PAT }}
